<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NipTuck Demo – Cosmetic Scan</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #050508;
      color: #e8e8e8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1rem;
    }
    h1 { font-size: clamp(1.5rem, 4vw, 2.5rem); margin-bottom: 0.25rem; }
    .sub { color: #6aa; margin-bottom: 1rem; font-size: 0.9rem; }
    .sub a { color: #8cc; }
    .camera-wrap {
      position: relative;
      width: 100%;
      max-width: 720px;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid #1a3a3a;
      box-shadow: 0 0 40px rgba(0,200,200,0.15);
    }
    .camera-wrap video {
      display: block;
      width: 100%;
      aspect-ratio: 4/3;
      object-fit: cover;
    }
    #scanOverlay {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      object-fit: cover;
    }
    .scan-active #scanOverlay { opacity: 1; }
    .controls {
      display: flex;
      gap: 1rem;
      margin-top: 1rem;
      flex-wrap: wrap;
      justify-content: center;
    }
    .btn {
      padding: 0.9rem 1.75rem;
      font-size: 1.1rem;
      font-weight: 600;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn:hover:not(:disabled) { transform: scale(1.02); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-scan {
      background: linear-gradient(135deg, #0aa, #066);
      color: #000;
      box-shadow: 0 0 20px rgba(0,170,170,0.4);
    }
    .btn-scan:hover:not(:disabled) { box-shadow: 0 0 30px rgba(0,170,170,0.5); }
    .btn-mic {
      background: #1a2a2a;
      color: #8cc;
      border: 1px solid #2a4a4a;
    }
    .btn-mic.listening { background: #0a2a2a; border-color: #0aa; color: #0ff; }
    .status { margin-top: 0.75rem; padding: 0.6rem 1rem; border-radius: 8px; max-width: 720px; min-height: 1.5rem; font-size: 0.95rem; }
    .status.error { background: #2a1515; color: #f88; }
    .status.loading { background: #0a1a1a; color: #8af; }
    .status.success { background: #0a1a15; color: #8f8; }
    .results { max-width: 720px; width: 100%; margin-top: 1rem; }
    .card {
      background: #0a1215;
      border: 1px solid #1a2a2a;
      border-radius: 10px;
      padding: 1rem 1.25rem;
      margin-bottom: 0.75rem;
      border-left: 4px solid #0aa;
    }
    .card h3 { margin: 0 0 0.5rem; font-size: 0.9rem; color: #6aa; text-transform: uppercase; letter-spacing: 0.05em; }
    .card p, .card ul { margin: 0; color: #ccc; line-height: 1.5; font-size: 1rem; white-space: pre-wrap; }
    .card ul { padding-left: 1.25rem; }
    .card .attract { font-size: 1.3rem; color: #0aa; font-weight: 600; }
  </style>
</head>
<body>
  <h1>NipTuck Demo</h1>
  <p class="sub">Cosmetic scan · Ruthless assessment · <a href="/guide.html">Setup guide</a></p>

  <div class="camera-wrap" id="cameraWrap">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="scanOverlay" width="640" height="480"></canvas>
  </div>

  <div class="controls">
    <button class="btn btn-scan" id="scanBtn" disabled>Start camera</button>
    <button class="btn btn-mic" id="micBtn" disabled title="Ask a question (speak)">🎤 Ask</button>
  </div>

  <div id="status" class="status"></div>
  <div id="results" class="results"></div>

  <script>
    const video = document.getElementById('video');
    const scanBtn = document.getElementById('scanBtn');
    const micBtn = document.getElementById('micBtn');
    const status = document.getElementById('status');
    const results = document.getElementById('results');
    const cameraWrap = document.getElementById('cameraWrap');
    const overlay = document.getElementById('scanOverlay');
    const overlayCtx = overlay.getContext('2d');

    let lastAssessment = null;
    let scanLineY = 0;
    let scanAnim = null;

    function setStatus(msg, type = '') {
      status.textContent = msg;
      status.className = 'status ' + type;
    }

    // MIB-style scan overlay
    function drawScan() {
      const w = overlay.width;
      const h = overlay.height;
      overlayCtx.clearRect(0, 0, w, h);

      const t = Date.now() / 1000;
      const glow = 0.3 + 0.2 * Math.sin(t * 4);

      // Corner brackets
      overlayCtx.strokeStyle = `rgba(0, 200, 200, ${0.6 + glow * 0.3})`;
      overlayCtx.lineWidth = 2;
      const pad = 20, br = 30;
      overlayCtx.beginPath();
      overlayCtx.moveTo(pad, pad); overlayCtx.lineTo(pad + br, pad); overlayCtx.moveTo(pad, pad); overlayCtx.lineTo(pad, pad + br);
      overlayCtx.moveTo(w - pad, pad); overlayCtx.lineTo(w - pad - br, pad); overlayCtx.moveTo(w - pad, pad); overlayCtx.lineTo(w - pad, pad + br);
      overlayCtx.moveTo(pad, h - pad); overlayCtx.lineTo(pad + br, h - pad); overlayCtx.moveTo(pad, h - pad); overlayCtx.lineTo(pad, h - pad - br);
      overlayCtx.moveTo(w - pad, h - pad); overlayCtx.lineTo(w - pad - br, h - pad); overlayCtx.moveTo(w - pad, h - pad); overlayCtx.lineTo(w - pad, h - pad - br);
      overlayCtx.stroke();

      // Horizontal scan line
      scanLineY = (scanLineY + 3) % (h + 40);
      const y = scanLineY - 20;
      const g = overlayCtx.createLinearGradient(0, y - 30, 0, y + 30);
      g.addColorStop(0, 'transparent');
      g.addColorStop(0.5, `rgba(0, 220, 220, ${0.4 + glow * 0.3})`);
      g.addColorStop(1, 'transparent');
      overlayCtx.fillStyle = g;
      overlayCtx.fillRect(0, y - 2, w, 4);
      overlayCtx.strokeStyle = `rgba(0, 255, 255, ${0.6 + glow * 0.2})`;
      overlayCtx.lineWidth = 1;
      overlayCtx.beginPath();
      overlayCtx.moveTo(0, y);
      overlayCtx.lineTo(w, y);
      overlayCtx.stroke();

      // Grid
      overlayCtx.strokeStyle = `rgba(0, 180, 180, ${0.08 + 0.04 * Math.sin(t * 2)})`;
      overlayCtx.lineWidth = 1;
      for (let i = 0; i < w; i += 40) {
        overlayCtx.beginPath();
        overlayCtx.moveTo(i, 0);
        overlayCtx.lineTo(i, h);
        overlayCtx.stroke();
      }
      for (let j = 0; j < h; j += 40) {
        overlayCtx.beginPath();
        overlayCtx.moveTo(0, j);
        overlayCtx.lineTo(w, j);
        overlayCtx.stroke();
      }

      // "SCANNING" text
      overlayCtx.fillStyle = `rgba(0, 200, 200, ${0.5 + 0.2 * Math.sin(t * 3)})`;
      overlayCtx.font = '14px monospace';
      overlayCtx.fillText('SCANNING', w / 2 - 35, 30);
    }

    function startScanAnimation() {
      cameraWrap.classList.add('scan-active');
      scanLineY = 0;
      function loop() {
        drawScan();
        scanAnim = requestAnimationFrame(loop);
      }
      scanAnim = requestAnimationFrame(loop);
    }

    function stopScanAnimation() {
      if (scanAnim) cancelAnimationFrame(scanAnim);
      scanAnim = null;
      cameraWrap.classList.remove('scan-active');
      overlayCtx.clearRect(0, 0, overlay.width, overlay.height);
    }

    async function startCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'user', width: { ideal: 1280 }, height: { ideal: 960 } },
          audio: true
        });
        video.srcObject = stream;
        video.onloadedmetadata = () => {
          overlay.width = video.videoWidth;
          overlay.height = video.videoHeight;
        };
        scanBtn.textContent = 'Scan me';
        scanBtn.disabled = false;
        micBtn.disabled = false;
        setStatus('Camera ready. Position yourself waist-up or full body, then Scan.', 'success');
      } catch (e) {
        setStatus('Camera denied: ' + e.message, 'error');
      }
    }

    function captureFrame() {
      const c = document.createElement('canvas');
      c.width = video.videoWidth;
      c.height = video.videoHeight;
      const ctx = c.getContext('2d');
      ctx.drawImage(video, 0, 0);
      return c.toDataURL('image/jpeg', 0.9);
    }

    function renderResults(data) {
      if (!data.personDetected || data.assessment?.startsWith?.('PERSON_NOT_DETECTED')) return;
      lastAssessment = data;
      let html = '';
      if (data.attractiveness !== undefined) {
        html += `<div class="card"><h3>Attractiveness</h3><p class="attract">${data.attractiveness}/10</p><p>${data.attractivenessNote || ''}</p></div>`;
      }
      if (data.celebrities?.length) {
        html += `<div class="card"><h3>Similar Looks</h3><ul><li>${data.celebrities.join('</li><li>')}</li></ul></div>`;
      }
      html += `<div class="card"><h3>Assessment</h3><p>${escapeHtml(data.assessment || '')}</p></div>`;
      results.innerHTML = html;
    }

    function escapeHtml(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML.replace(/\n/g, '<br>');
    }

    scanBtn.addEventListener('click', async () => {
      scanBtn.disabled = true;
      startScanAnimation();
      setStatus('Scanning…', 'loading');
      results.innerHTML = '';

      const base64 = captureFrame();
      try {
        const r = await fetch('/api/demo/analyze', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ image: base64 })
        });
        const data = await r.json();
        stopScanAnimation();

        if (!r.ok) {
          setStatus(data.error || 'Analysis failed', 'error');
        } else if (!data.personDetected || data.assessment?.startsWith?.('PERSON_NOT_DETECTED')) {
          setStatus('No person detected. Position yourself clearly in frame.', 'error');
        } else {
          setStatus('Scan complete.', 'success');
          renderResults(data);
          speak(data.assessment);
        }
        scanBtn.disabled = false;
      } catch (e) {
        stopScanAnimation();
        setStatus('Error: ' + e.message, 'error');
        scanBtn.disabled = false;
      }
    });

    function speak(text) {
      if (!window.speechSynthesis || !text) return;
      window.speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(text.slice(0, 500));
      u.rate = 0.95;
      u.pitch = 1;
      const voices = speechSynthesis.getVoices();
      const en = voices.find(v => v.lang.startsWith('en'));
      if (en) u.voice = en;
      speechSynthesis.speak(u);
    }

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    let recognition = null;
    if (SpeechRecognition) {
      recognition = new SpeechRecognition();
      recognition.continuous = false;
      recognition.interimResults = false;
      recognition.lang = 'en-US';
      recognition.onresult = async (e) => {
        const t = e.results[0][0].transcript;
        micBtn.classList.remove('listening');
        micBtn.disabled = true;
        setStatus('You: ' + t, 'loading');
        try {
          const r = await fetch('/api/demo/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              message: t,
              context: lastAssessment ? lastAssessment.assessment : ''
            })
          });
          const data = await r.json();
          if (data.reply) {
            speak(data.reply);
            setStatus('Response spoken.', 'success');
            results.innerHTML += `<div class="card"><h3>You asked</h3><p>${escapeHtml(t)}</p><h3>Reply</h3><p>${escapeHtml(data.reply)}</p></div>`;
          }
        } catch (err) {
          setStatus('Error: ' + err.message, 'error');
        }
        micBtn.disabled = false;
      };
      recognition.onerror = () => {
        micBtn.classList.remove('listening');
        micBtn.disabled = false;
      };
    }

    micBtn.addEventListener('click', () => {
      if (!recognition || !lastAssessment) {
        setStatus('Complete a scan first, then ask questions.', 'error');
        return;
      }
      micBtn.classList.add('listening');
      setStatus('Listening…', 'loading');
      recognition.start();
    });

    if (window.speechSynthesis) speechSynthesis.getVoices();
    startCamera();
  </script>
</body>
</html>
