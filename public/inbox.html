<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>My Creations – NipTuck</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Montserrat', system-ui, sans-serif;
      background: linear-gradient(160deg, #0a0a0c 0%, #151518 50%, #0d0d10 100%);
      color: #e8e8e8;
      min-height: 100vh;
      padding: 2rem;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 2rem;
      flex-wrap: wrap;
      gap: 1rem;
    }
    .header h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.75rem, 4vw, 2.5rem);
      font-weight: 600;
      margin: 0;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .header h1 .icon { font-size: 1.2em; }
    .badge {
      background: rgba(212, 175, 55, 0.2);
      color: #d4af37;
      padding: 0.25rem 0.6rem;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 600;
    }
    .back-link {
      color: #8a8a9a;
      text-decoration: none;
      font-size: 0.9rem;
      transition: color 0.2s;
    }
    .back-link:hover { color: #d4af37; }
    .empty {
      text-align: center;
      padding: 4rem 2rem;
      color: #555;
    }
    .empty .icon { font-size: 4rem; opacity: 0.4; margin-bottom: 1rem; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 1.25rem;
    }
    .card {
      background: rgba(25, 25, 30, 0.8);
      border: 1px solid #2a2a35;
      border-radius: 12px;
      overflow: hidden;
      transition: border-color 0.2s, transform 0.15s;
    }
    .card:hover {
      border-color: #d4af37;
      transform: translateY(-2px);
    }
    .card-thumb {
      aspect-ratio: 16/10;
      background: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .card-thumb img, .card-thumb video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .card-body {
      padding: 0.75rem 1rem;
    }
    .card-label { font-size: 0.8rem; color: #888; }
    .card-type {
      display: inline-block;
      font-size: 0.7rem;
      padding: 0.2rem 0.5rem;
      background: rgba(212, 175, 55, 0.2);
      color: #d4af37;
      border-radius: 4px;
      margin-top: 0.35rem;
    }
    .card-actions {
      margin-top: 0.5rem;
      display: flex;
      gap: 0.5rem;
    }
    .card-actions a {
      font-size: 0.8rem;
      color: #d4af37;
      text-decoration: none;
    }
    .card-actions a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="header">
    <h1><span class="icon">📬</span> My Creations <span class="badge" id="countBadge">0</span></h1>
    <a href="/" class="back-link">← Back to NipTuck</a>
  </div>
  <div id="empty" class="empty" style="display:none">
    <div class="icon">✨</div>
    <p>No creations yet.</p>
    <p>Generate images or videos in <a href="/demo.html" style="color:#d4af37">Demo</a> or <a href="/motionmuse.html" style="color:#d4af37">MotionMuse</a> – they'll appear here.</p>
  </div>
  <div id="grid" class="grid"></div>

  <script>
    async function load() {
      try {
        const r = await fetch('/api/demo/inbox');
        const { items } = await r.json();
        const empty = document.getElementById('empty');
        const grid = document.getElementById('grid');
        const badge = document.getElementById('countBadge');
        badge.textContent = items?.length || 0;
        if (!items?.length) {
          empty.style.display = 'block';
          grid.innerHTML = '';
          return;
        }
        empty.style.display = 'none';
        grid.innerHTML = items.map(it => `
          <div class="card">
            <div class="card-thumb">
              ${it.type === 'video'
                ? `<video src="${it.url}" muted loop playsinline></video>`
                : `<img src="${it.thumbnail || it.url}" alt="${it.label}" loading="lazy">`
              }
            </div>
            <div class="card-body">
              <div class="card-label">${it.label}</div>
              <span class="card-type">${it.type}</span>
              <div class="card-actions">
                <a href="${it.url}" target="_blank" rel="noopener">Open</a>
                <a href="${it.url}" download>Download</a>
              </div>
            </div>
          </div>
        `).join('');
      } catch (e) {
        document.getElementById('empty').style.display = 'block';
        document.getElementById('empty').innerHTML = `<p>Could not load inbox.</p>`;
      }
    }
    load();
    setInterval(load, 5000);
  </script>
</body>
</html>
